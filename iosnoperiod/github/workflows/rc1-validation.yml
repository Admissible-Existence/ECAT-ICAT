name: RC1 Validation

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate ECAT and ICAT profiles
        run: python3 tools/validate_profiles.py

      - name: Compare expected RC1 output
        run: python3 tools/check_expected.py

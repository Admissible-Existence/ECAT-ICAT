name: RC1 Validation

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate ECAT and ICAT profiles
        run: python3 tools/validate_profiles.py

      - name: Compare expected RC1 output
        run: python3 tools/check_expected.py

      - name: Check schema conformance
        run: python3 tools/check_schema_conformance.py

      - name: Check receipt generation readiness
        run: python3 tools/check_receipt_generation.py

      - name: Check management intake readiness
        run: python3 tools/check_management_intake.py

      - name: Check management handoff readiness
        run: python3 tools/check_management_handoff.py

      - name: Check RC1 release readiness structure
        run: python3 tools/check_release_ready.py

      - name: Generate RC1 artifact receipts
        run: |
          set -euo pipefail
          mkdir -p receipts
          find README.md RELEASE_CANDIDATE.md LICENSE docs schemas examples tests tools iosnoperiod -type f | sort | xargs sha256sum > receipts/rc1-artifact-receipts.sha256

      - name: Upload RC1 artifact receipts
        uses: actions/upload-artifact@v4
        with:
          name: rc1-artifact-receipts
          path: receipts/rc1-artifact-receipts.sha256
